<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>contact-Section - Coders Creed</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdn.emailjs.com/dist/email.min.js"></script>

    <style>
        #contact {
            background: #ffffff;
            color: rgb(0, 0, 0);
            text-align: center;
            padding: 50px 20px;
            font-family: 'Orbitron', sans-serif;
        }
        .contact-container {
            max-width: 800px;
            margin: auto;
        }
        .contact-form {
            margin-top: 20px;
        }
        .contact-form label {
            display: block;
            margin-top: 10px;
            font-size: 18px;
        }
        .contact-form input, .contact-form textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            background: rgba(0, 255, 255, 0.1);
            border: 2px solid #0ff;
            color: #fff;
            border-radius: 5px;
            font-size: 16px;
        }
        .contact-form button {
            background: #0ff;
            color: #121212;
            border: none;
            padding: 10px 20px;
            font-size: 18px;
            margin-top: 10px;
            cursor: pointer;
            transition: 0.3s;
            border-radius: 5px;
        }
        .contact-form button:hover {
            background: #00f;
            color: #fff;
            box-shadow: 0 0 10px #00f;
        }
        .contact-info {
            margin-top: 30px;
        }
        .social-links a {
            color: #0ff;
            font-size: 20px;
            margin: 0 10px;
            transition: 0.3s;
        }
        .social-links a:hover {
            color: #00f;
            text-shadow: 0 0 15px #00f;
        }
    </style>
</head>
<body>
<section id="contact">
    <div class="contact-container">
        <h1>Contact Us</h1>
        <p>We'd love to hear from you! Reach out to us through the form below or via our social media.</p>
        
        <div class="contact-form">
            <form id="contact-form">
                <label for="name">Your Name</label>
                <input type="text" id="name" name="name" required>
            
                <label for="email">Your Email</label>
                <input type="email" id="email" name="email" required>
            
                <label for="message">Your Message</label>
                <textarea id="message" name="message" rows="5" required></textarea>
            
                <button type="submit">Send Message</button>
            </form>
        </div>
        
        <div class="contact-info">
            <h2>Other Ways to Reach Us</h2>
            <p>Email: <a href="mailto:contact@coderscreed.com">contact@coderscreed.com</a></p>
            <p>Phone: +123 456 7890</p>
            <p>Follow us on social media:</p>
            <div class="social-links">
                <a href="#" target="_blank"><i class="fa-brands fa-facebook"></i></a>
                <a href="#" target="_blank"><i class="fa-brands fa-twitter"></i></a>
                <a href="#" target="_blank"><i class="fa-brands fa-linkedin"></i></a>
                <a href="#" target="_blank"><i class="fa-brands fa-instagram"></i></a>
            </div>
        </div>
    </div>

</section>
<script>
    document.addEventListener("DOMContentLoaded", function () {
        document.getElementById("contact-form").addEventListener("submit", function (event) {
            event.preventDefault(); // Prevent default form submission
    
            // Initialize EmailJS
            emailjs.init("YOUR_PUBLIC_KEY"); // Replace with your EmailJS Public Key
    
            // Collect Form Data
            let formData = {
                name: document.getElementById("name").value,
                email: document.getElementById("email").value,
                message: document.getElementById("message").value,
            };
    
            // Send Email via EmailJS
            emailjs.send("YOUR_SERVICE_ID", "YOUR_TEMPLATE_ID", formData)
                .then(response => {
                    alert("Email sent successfully! 🎉");
                    document.getElementById("contact-form").reset(); // Clear form after submission
                })
                .catch(error => {
                    alert("Failed to send email. Please try again.");
                    console.error("EmailJS Error:", error);
                });
        });
    });
    
</script>
</body>
</html>
